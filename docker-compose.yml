version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ymail_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ymail
      POSTGRES_PASSWORD: ymail_dev_pw
      POSTGRES_DB: ymail_mcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ymail -d ymail_mcp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ymail_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    container_name: ymail_api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ymail:ymail_dev_pw@postgres:5432/ymail_mcp
      REDIS_URL: redis://redis:6379

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    container_name: ymail_worker
    restart: unless-stopped
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ymail:ymail_dev_pw@postgres:5432/ymail_mcp
      REDIS_URL: redis://redis:6379

volumes:
  postgres_data:
  redis_data:
